# ONNX Runtime memory attribution probe — Linux edition (#90).
#
# Runs tests/onnx_memory_probe.rs on ubuntu (the same environment class as the
# field reports: Linux, jemalloc-linked rocksdb) and publishes the staged-RSS
# table. Windows local measurement attributed ~179MB to ONNX with a flat
# arena-reuse signature; this run tests whether that number transfers to Linux
# before we claim closure on the #90 plateau decomposition.
name: diag — ONNX memory probe (Linux)
on:
  workflow_dispatch:
  push:
    branches: [diag/onnx-memory-probe]
    paths: ['.github/workflows/diag-onnx-probe.yml', 'tests/onnx_memory_probe.rs']

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM (ONNX runtime build dep)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Cache MiniLM embedder
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1

      - name: Cache GLiNER typer assets
        id: gliner-cache
        uses: actions/cache@v4
        with:
          path: models/gliner-bi-edge
          key: gliner-bi-edge-onnx-v1

      - name: Fetch GLiNER typer assets
        if: steps.gliner-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p models/gliner-bi-edge
          gh release download gliner-bi-edge-onnx-v1 --repo "$GITHUB_REPOSITORY" --dir models/gliner-bi-edge
          ls -la models/gliner-bi-edge

      - name: Pre-fetch MiniLM embedder
        run: |
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          M="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$M"
          PIN=c9745ed1d9f207416be6d2e6f8de32d1f16199bf
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/$PIN"
          [ -s "$M/model_quantized.onnx" ] || dl "$M/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$M/tokenizer.json" ]       || dl "$M/tokenizer.json" "$B/tokenizer.json"

      - name: Run probe
        env:
          # Attribute the REAL typer's memory (GLiNER bi-edge), not the fallback.
          SHODH_GLINER_MODEL_PATH: ${{ github.workspace }}/models/gliner-bi-edge
        run: |
          set -o pipefail
          cargo test --test onnx_memory_probe -- --ignored --nocapture 2>&1 | tee probe.log

      - name: Publish table
        if: always()
        run: |
          echo "## ONNX RSS attribution — Linux (ubuntu runner)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sed -n '/=== ONNX RSS attribution/,/TOTAL ONNX-attributable/p' probe.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "_Windows local reference: embedder init+1st = +137.3MB · reuse Δ = +0.1MB · NER = +32.5MB · total ≈ +179MB_" >> "$GITHUB_STEP_SUMMARY"
