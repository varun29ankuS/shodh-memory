# Embedder ablation — does a stronger embedder lift LongMemEval recall@10?
#
# The embedder feeds the VECTOR leg, which carries recall@10 (unlike NER/graph,
# redundant in fusion). This is the one lever with a real shot at the headline 0.766.
#
# Four-way, all INT8 ONNX, on ONE deterministic fixture (first-N, no shuffle, so
# every arm sees the SAME questions). Each embedder is its own matrix job (full 6h
# budget, parallel) gated behind a fast pooling unit-test (a mis-wired pooling mode
# silently corrupts every embedding — caught here, before any 1h+ recall arm):
#   minilm  — MiniLM-L6   384  Mean        (baseline)
#   nomic   — nomic v1.5   768  Mean
#   granite — granite-r2   768  CLS         (IBM, auditable, Apache-2.0)
#   harrier — harrier-270m 768  LastToken   (Microsoft, MTEB 66.5, MIT)
name: Embedder Ablation
on:
  push:
    branches: ['exp/embedder-test']
    paths: ['.github/workflows/embedder-ablation.yml', 'src/embeddings/**']
  workflow_dispatch:
    inputs:
      limit:
        description: 'LongMemEval questions (deterministic first-N)'
        required: false
        default: '20'

permissions:
  contents: read
concurrency:
  group: embedder-ablation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: the pooling index arithmetic (CLS=first, LastToken=last-attended,
  # Mean=avg, + batch base offset). A bug here makes every recall number a lie.
  pooling-unittest:
    name: Pooling sanity (unit test)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM (ONNX runtime build dep)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Pooling unit tests
        # --lib: test only the library target (where pool_tokens lives). Avoids
        # building the recall_eval bin's test harness, which has a pre-existing
        # link issue unrelated to this change (the bin itself builds fine via
        # `cargo build --bin` in the matrix below).
        run: cargo test --release -p shodh-memory --lib pool_tokens -- --nocapture

  ablation:
    name: ${{ matrix.arm }}
    needs: pooling-unittest
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          # Trimmed to the viable small set: MiniLM baseline + granite-97m (98MB int8,
          # 384-dim, auditable, multilingual). nomic comes from the parallel run on
          # exp/embedder-test; the heavy granite-311m + harrier were dropped (too slow
          # for the edge thesis).
          - arm: minilm
            embedder: ''
            dim: '384'
            model_path: '/home/runner/.cache/shodh-memory/models/minilm-l6'
            use_quant: '1'
          - arm: granite97
            embedder: 'granite-small'          # CLS pooling, 384-native (98MB int8)
            dim: '384'
            repo: 'ibm-granite/granite-embedding-97m-multilingual-r2'
            model_path: '/home/runner/models/granite97'
            use_quant: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM (ONNX runtime build dep)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval

      - name: Cache MiniLM embedder
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          MODEL_DIR="$HOME/.cache/shodh-memory/models/minilm-l6"
          mkdir -p "$MODEL_DIR"
          PIN=c9745ed1d9f207416be6d2e6f8de32d1f16199bf
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/$PIN"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MODEL_DIR/model_quantized.onnx" ] || dl "$MODEL_DIR/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MODEL_DIR/tokenizer.json" ]       || dl "$MODEL_DIR/tokenizer.json" "$B/tokenizer.json"

      - name: Download ${{ matrix.arm }} INT8 ONNX
        if: ${{ matrix.embedder != '' }}
        run: |
          DIR="$HOME/models/${{ matrix.arm }}"
          mkdir -p "$DIR"
          B="https://huggingface.co/${{ matrix.repo }}/resolve/main"
          # Save the int8 graph AS model.onnx so the loader picks it with
          # SHODH_USE_QUANTIZED_MODEL=0 (no quantized-filename guessing). Try the
          # common int8 export names in order; fp32 only as last resort.
          #
          # External-data ONNX (e.g. onnx-community harrier) keeps weights in a
          # sibling "<basename>.onnx_data" that the graph references BY NAME — the
          # graph alone won't load. So for whichever candidate wins, also fetch its
          # "<basename>.onnx_data" under that exact name (ONNX resolves it relative
          # to the .onnx dir). Harmless 404 for single-file models.
          dl_model() {
            local dir="$1"; shift
            for f in "$@"; do
              if curl -fL --retry 5 --retry-all-errors -o "$dir/model.onnx" "$B/$f"; then
                echo "  graph: $f -> model.onnx"
                local dn
                dn="$(basename "${f%.onnx}").onnx_data"   # e.g. model_quantized.onnx_data
                if curl -fL --retry 4 --retry-all-errors -o "$dir/$dn" "$B/${f%.onnx}.onnx_data"; then
                  echo "  external data: $dn ($(du -h "$dir/$dn" | cut -f1))"
                else
                  rm -f "$dir/$dn"; echo "  (single-file, no external data)"
                fi
                return 0
              fi
            done
            echo "  FAILED all candidates"; return 1
          }
          # Candidate int8 names vary by exporter: transformers.js/IBM use
          # model_quint8_avx2.onnx; onnx-community uses model_int8/model_quantized.
          # fp32 model.onnx is the last-resort fallback (slow — avoid).
          dl_model "$DIR" \
            onnx/model_int8.onnx onnx/model_quint8_avx2.onnx onnx/model_quantized.onnx \
            onnx/model_uint8.onnx onnx/model.onnx
          curl -fL --retry 5 --retry-all-errors -o "$DIR/tokenizer.json" "$B/tokenizer.json"
          ls -la "$DIR"

      - name: Build deterministic LongMemEval fixture (first-N, shared across arms)
        run: |
          python3 -m pip install --quiet huggingface_hub
          JSON=$(python3 - <<'PY'
          from huggingface_hub import hf_hub_download
          print(hf_hub_download(repo_id='xiaowu0162/longmemeval-cleaned',
                                filename='longmemeval_s_cleaned.json', repo_type='dataset'))
          PY
          )
          python3 benchmarks/longmemeval_to_harness.py --input "$JSON" \
            --limit ${{ github.event.inputs.limit || '20' }}
          wc -l tests/recall/longmemeval/manifest.jsonl

      - name: Run ${{ matrix.arm }}
        env:
          SHODH_EMBEDDER: ${{ matrix.embedder }}
          SHODH_MODEL_PATH: ${{ matrix.model_path }}
          SHODH_TEXT_DIM: ${{ matrix.dim }}
          SHODH_USE_QUANTIZED_MODEL: ${{ matrix.use_quant }}
        run: |
          N=${{ github.event.inputs.limit || '20' }}
          START=$(date +%s)
          ./target/release/recall-eval --longmemeval tests/recall/longmemeval \
            --output unused.json --storage ./storage-${{ matrix.arm }} 2>&1 | tee run.log
          ELAPSED=$(( $(date +%s) - START ))
          echo "### ${{ matrix.arm }} (dim ${{ matrix.dim }}, embedder='${{ matrix.embedder }}')" > summary.txt
          grep -E "LongMemEval-S:|recall@10|single_hop|multi_hop|temporal|knowledge" run.log >> summary.txt || true
          echo "speed: ${ELAPSED}s total / n=${N} = $(( ELAPSED / N ))s per question" >> summary.txt
          cat summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ${{ matrix.arm }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embedder-${{ matrix.arm }}
          path: |
            run.log
            summary.txt
