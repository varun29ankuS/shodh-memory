# LoCoMo held-out recall@k — LLM-free generalization check.
#
# Runs the SAME recall-eval harness as recall.yml, but against the LoCoMo suite
# (5,882 dialogue-turn corpus + 1,531 questions with gold evidence dia-ids,
# generated by benchmarks/locomo_to_harness.py from snap-research/locomo). None
# of the pipeline changes were diagnosed against LoCoMo, so recall@k here tests
# whether a fix tuned on the 108 smoke cases GENERALIZES.
#
# Manual only and NOT gated (no baseline) — it reports numbers. To measure a
# fix's effect, dispatch twice with different `ref` inputs (e.g. the commit
# before and after) and diff the uploaded reports.
name: LoCoMo Recall (held-out)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref to benchmark (blank = this branch)'
        required: false
        default: ''
      repeats:
        description: 'Ingest+query repeats (1 is fine for a diagnostic)'
        required: false
        default: '1'
      layer:
        description: 'Layer attribution: full or all (per-stage)'
        required: false
        default: 'full'
      diag_k:
        description: 'Diagnostic cutoff: fetch this many results so per-case recall@50/@100 are meaningful (blank/10 = normal). Use 100 to split ranking vs retrieval-reach.'
        required: false
        default: ''
      reachability:
        description: 'Graph-reachability diagnostic: set true to skip the recall run and instead report, per category, how much gold is reachable from query seed entities within N entity-hops (pure topology).'
        required: false
        default: 'false'
      graph_w:
        description: 'Override the graph leg fusion weight (blank = density-default). 0 = graph-OFF, lexical+vector only. Use to measure whether the net-negative graph leg should be removed.'
        required: false
        default: ''
      embedder:
        description: 'Embedding model: blank/minilm = MiniLM-L6 (default), e5 = e5-small-v2 (384-dim, retrieval-tuned, asymmetric query/passage). Edge-legal drop-in.'
        required: false
        default: ''
      learning_curve:
        description: 'Learning-curve diagnostic ("smarter with use"): set true to skip recall and instead measure the reward gradient (Helpful/Neutral/Misleading) over reinforcement cycles on the smoke corpus.'
        required: false
        default: 'false'
      reward_lr_mult:
        description: 'Reward learning-rate multiplier for the in-memory RL (default 1.0). Raise (e.g. 8) to amplify reward-modulated plasticity and see if it moves rank, not just score.'
        required: false
        default: ''
      graph_idf:
        description: 'Graph fine-tune: set true for IDF-at-birth edge weighting (born-weak speaker hubs).'
        required: false
        default: ''
      hub_max:
        description: 'Graph fine-tune: max entity degree before it stops accreting edges (default 300; lower e.g. 50 to kill speaker hubs early).'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: locomo-recall-${{ github.ref }}
  cancel-in-progress: true

jobs:
  locomo-recall:
    name: LoCoMo Recall
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      # Fetch the full history of the dispatched branch, then check out the
      # requested commit by hand. `actions/checkout`'s `ref` input is resolved
      # as a branch/tag name pattern (`+refs/heads/<ref>*`), so a raw commit
      # SHA — short or full — fails the fetch. Checking out manually after a
      # full-depth fetch makes the documented "dispatch twice with the commit
      # before and after" A/B flow actually work for SHAs.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out requested commit
        if: ${{ github.event.inputs.ref != '' }}
        run: |
          git checkout "${{ github.event.inputs.ref }}"
          echo "Checked out $(git rev-parse --short HEAD)"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval

      - name: Install LLVM (ONNX runtime build dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Set up e5-small-v2 embedder
        if: ${{ github.event.inputs.embedder == 'e5' }}
        run: |
          E5_DIR="$HOME/models/e5-small-v2"
          mkdir -p "$E5_DIR"
          echo "Downloading e5-small-v2 ONNX + tokenizer (Xenova/e5-small-v2)…"
          curl -fL --retry 3 -o "$E5_DIR/model.onnx" \
            https://huggingface.co/Xenova/e5-small-v2/resolve/main/onnx/model.onnx
          curl -fL --retry 3 -o "$E5_DIR/tokenizer.json" \
            https://huggingface.co/Xenova/e5-small-v2/resolve/main/tokenizer.json
          ls -la "$E5_DIR"
          # Route the embedder at this model + enable e5 query/passage prefixes.
          echo "SHODH_EMBEDDER=e5" >> "$GITHUB_ENV"
          echo "SHODH_MODEL_PATH=$E5_DIR" >> "$GITHUB_ENV"
          echo "SHODH_USE_QUANTIZED_MODEL=0" >> "$GITHUB_ENV"

      - name: Build recall-eval
        run: cargo build --release --bin recall-eval

      - name: Graph reachability diagnostic
        if: ${{ github.event.inputs.reachability == 'true' }}
        run: |
          ./target/release/recall-eval \
            --suite locomo \
            --graph-reachability locomo-reachability.json \
            --output locomo-recall.json \
            --storage ./locomo-storage 2>&1 | tee locomo-reachability.log
          echo "## LoCoMo graph reachability (pure topology, activation-free)" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open('locomo-reachability.json'))
          def pct(n,dn): return 0.0 if dn==0 else 100.0*n/dn
          print(f"- max_hops: {d['max_hops']}  (≤2hop% = canonical double-hop signal)")
          print("\n| category | cases | gold | ≤1hop% | ≤2hop% | unreach% | no-seed% | cases≥2seed% | gold≥2seed% |")
          print("| --- | --- | --- | --- | --- | --- | --- | --- | --- |")
          rows = sorted(d['by_category'].items()) + [('ALL', d['overall'])]
          for name,c in rows:
              g=c['gold_total']
              print(f"| {name} | {c['cases']} | {g} | {pct(c['reachable_within_1'],g):.1f} | {pct(c['reachable_within_2'],g):.1f} | {pct(c['unreachable'],g):.1f} | {pct(c['cases_no_seed'],c['cases']):.1f} | {pct(c.get('cases_multi_seed',0),c['cases']):.1f} | {pct(c.get('gold_multi_seed',0),g):.1f} |")
          print("\ngold≥2seed% = the G5 multi-seed discrimination signal. If ~0, queries resolve to too few graph cues; the lever is richer query→graph cue extraction, not episode scoring.")
          PY

      - name: Learning-curve diagnostic (reward gradient)
        if: ${{ github.event.inputs.learning_curve == 'true' }}
        env:
          SHODH_REWARD_LR_MULT: ${{ github.event.inputs.reward_lr_mult }}
          SHODH_GRAPH_IDF_EDGES: ${{ github.event.inputs.graph_idf }}
          SHODH_HUB_DEGREE_MAX: ${{ github.event.inputs.hub_max }}
        run: |
          ./target/release/recall-eval \
            --suite smoke \
            --learning-curve learning-curve.json \
            --lc-cycles 8 \
            --output unused-recall.json \
            --storage ./lc-storage 2>&1 | tee learning-curve.log
          echo "## Learning curve — reward-modulated plasticity (in-memory RL)" >> "$GITHUB_STEP_SUMMARY"
          echo "Reward LR mult: \`${SHODH_REWARD_LR_MULT:-1.0 (default)}\`" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open('learning-curve.json'))
          print(f"\ncycles: {d['cycles']}. A real reward gradient: Helpful rank DOWN, Misleading rank UP, Neutral flat.\n")
          print("| outcome | tracked | rank cold→final (Δ) | score cold→final (Δ) | imp/wor/unc |")
          print("| --- | --- | --- | --- | --- |")
          for a in d['arms']:
              r=a['mean_rank_by_cycle']; s=a['mean_score_by_cycle']
              print(f"| **{a['outcome']}** | {a['tracked_cases']} | {r[0]:.2f}→{r[-1]:.2f} ({a['mean_rank_delta']:+.3f}) | {s[0]:.4f}→{s[-1]:.4f} ({a['mean_score_delta']:+.4f}) | {a['improved']}/{a['worsened']}/{a['unchanged']} |")
          h=next((a for a in d['arms'] if a['outcome']=='Helpful'),None)
          m=next((a for a in d['arms'] if a['outcome']=='Misleading'),None)
          if h and m:
              spread = m['mean_rank_delta'] - h['mean_rank_delta']
              print(f"\nGradient spread (Misleading − Helpful rank Δ): **{spread:+.3f}** — bigger = reward steers recall more strongly.")
          PY

      - name: Run LoCoMo recall@k
        if: ${{ github.event.inputs.reachability != 'true' && github.event.inputs.learning_curve != 'true' }}
        env:
          RECALL_DIAG_K: ${{ github.event.inputs.diag_k }}
          SHODH_GRAPH_FUSION_WEIGHT: ${{ github.event.inputs.graph_w }}
        run: |
          ./target/release/recall-eval \
            --suite locomo \
            --layer "${{ github.event.inputs.layer }}" \
            --repeats "${{ github.event.inputs.repeats }}" \
            --output locomo-recall.json \
            --per-case-output locomo-per-case.json \
            --storage ./locomo-storage 2>&1 | tee locomo-recall.log
          echo "## LoCoMo held-out recall@k" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          from collections import defaultdict
          d = json.load(open('locomo-recall.json'))
          full = d['layers'].get('full') or next(iter(d['layers'].values()))
          print(f"- cases: {d['case_count']}  (held-out, gold-evidence)")
          print(f"- **recall@10: {full['recall@10']:.4f}**  ndcg@10: {full['ndcg@10']:.4f}  mrr: {full['mrr']:.4f}")
          print("\n| category | recall@10 | ndcg@10 |")
          print("| --- | --- | --- |")
          for cat, r in sorted(d['by_category'].items()):
              print(f"| {cat} | {r['recall@10']:.3f} | {r['ndcg@10']:.3f} |")
          # Ranking-vs-retrieval split from per-case recall@{10,50,100}. The gap
          # recall@100 - recall@10 is the headroom a perfect top-100 reranker
          # could recover; a small gap means the gold is not in the pool at all
          # (a retrieval-reach problem the reranker cannot fix).
          try:
              pc = json.load(open('locomo-per-case.json'))['full']
              agg = defaultdict(lambda: {'n':0,'r10':0.0,'r50':0.0,'r100':0.0})
              for c in pc:
                  a = agg[c['category']]; a['n']+=1
                  a['r10']+=c['recall_at_k']; a['r50']+=c.get('recall_at_50',c['recall_at_k']); a['r100']+=c.get('recall_at_100',c['recall_at_k'])
              if any(a['r100']>a['r10'] for a in agg.values()):
                  print("\n### Ranking vs retrieval (recall@k over the SAME wide pool)")
                  print("| category | recall@10 | recall@50 | recall@100 | rerank headroom |")
                  print("| --- | --- | --- | --- | --- |")
                  for cat,a in sorted(agg.items()):
                      n=a['n']; print(f"| {cat} | {a['r10']/n:.3f} | {a['r50']/n:.3f} | {a['r100']/n:.3f} | {(a['r100']-a['r10'])/n:+.3f} |")
          except Exception as e:
              print(f"\n(diagnostic recall@k split unavailable: {e})")
          PY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locomo-recall-report
          path: |
            locomo-recall.json
            locomo-per-case.json
            locomo-recall.log
            locomo-reachability.json
            locomo-reachability.log
            learning-curve.json
            learning-curve.log
