name: graph edge-direction A/B (LongMemEval) — does fixing the self-loop move multi_hop?

# AUDIT (2026-06-22): every graph traversal (spread/PPR/reach/beam) took edge.to_entity
# as the neighbour, but edges are indexed under BOTH endpoints, so every incoming edge
# resolved to the source itself — a self-loop. The "graph disconnected from multi_hop,
# 5 runs" verdict (multi_hop 0.5595) was measured ON LongMemEval, on that half-wired
# graph. SHODH_GRAPH_EDGE_DIR=1 routes to the true non-source endpoint.
#   A = control            (flag off — legacy to_entity-only, bit-identical to main)
#   B = SHODH_GRAPH_EDGE_DIR=1   (direction fix)
# Run on LongMemEval-S (the production benchmark; LongMemEval also HARD-REFUSES fallback
# NER, so this measures on neural NER, unlike the capped LoCoMo ablations). Read: if the
# self-loop was binding, multi_hop recall@10 lifts with single_hop HELD. If multi_hop is
# bit-identical, the coverage-ceiling verdict survives a correctly-wired graph.
# Directional: limit=50 representative mix; a winner needs the full 479 + repeats before
# flipping the default.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'LongMemEval questions per arm (representative via --shuffle). Blank = all 479.'
        required: false
        default: '50'
  push:
    paths: ['.github/workflows/graph-edge-dir-ab.yml', 'src/memory/graph_retrieval.rs']
    branches: [fix/graph-edge-direction]

permissions:
  contents: read

concurrency:
  group: edge-dir-ab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-dir-lme:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM (ONNX runtime build dep)
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache embedder model
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM embedder model
        run: |
          MODEL_DIR="$HOME/.cache/shodh-memory/models/minilm-l6"
          mkdir -p "$MODEL_DIR"
          PIN=c9745ed1d9f207416be6d2e6f8de32d1f16199bf
          BASE="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/$PIN"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MODEL_DIR/model_quantized.onnx" ] || dl "$MODEL_DIR/model_quantized.onnx" "$BASE/onnx/model_quint8_avx2.onnx"
          [ -s "$MODEL_DIR/tokenizer.json" ]       || dl "$MODEL_DIR/tokenizer.json" "$BASE/tokenizer.json"

      - name: Download LongMemEval-S + build fixtures (shared by both arms)
        run: |
          python3 -m pip install --quiet huggingface_hub
          JSON=$(python3 - <<'PY'
          from huggingface_hub import hf_hub_download
          print(hf_hub_download(repo_id='xiaowu0162/longmemeval-cleaned',
                                filename='longmemeval_s_cleaned.json',
                                repo_type='dataset'))
          PY
          )
          echo "dataset: $JSON"
          python3 benchmarks/longmemeval_to_harness.py --input "$JSON" --shuffle \
            ${{ github.event.inputs.limit != '' && format('--limit {0}', github.event.inputs.limit) || '--limit 50' }}
          wc -l tests/recall/longmemeval/manifest.jsonl

      - name: A — control (legacy to_entity)
        run: |
          set -o pipefail
          ./target/release/recall-eval --longmemeval tests/recall/longmemeval \
            --output /dev/null --storage ./lme-a 2>&1 | tee a.log
      - name: B — edge-direction fix
        run: |
          set -o pipefail
          SHODH_GRAPH_EDGE_DIR=1 ./target/release/recall-eval --longmemeval tests/recall/longmemeval \
            --output /dev/null --storage ./lme-b 2>&1 | tee b.log

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import re
          def parse(fn):
              overall=float('nan'); p1=float('nan'); cats={}; ner='?'; flips=None
              try: text=open(fn).read()
              except FileNotFoundError: return overall,p1,cats,ner,flips
              for line in text.splitlines():
                  mo=re.search(r'LongMemEval-S:\s*\d+\s*questions\s*\(NER=(\w+)\).*recall@\d+\s*=\s*([0-9.]+)', line)
                  if mo: ner=mo.group(1); overall=float(mo.group(2))
                  mp=re.search(r'p@1\s*=\s*([0-9.]+)', line)
                  if mp: p1=float(mp.group(1))
                  mf=re.search(r'EDGE_DIR_FLIPS=(\d+)', line)
                  if mf: flips=int(mf.group(1))
                  mc=re.match(r'\s+(\w+)\s+n=(\d+)\s+recall@\d+\s*=\s*([0-9.]+)', line)
                  if mc: cats[mc.group(1)]=float(mc.group(3))
              return overall,p1,cats,ner,flips
          ao,ap,ac,an,af=parse('a.log'); bo,bp,bc,bn,bf=parse('b.log')
          print("## graph edge-direction A/B on LongMemEval-S — turn-level recall@10 + p@1\n")
          print(f"_NER backend: control={an}, dir_fix={bn} (LongMemEval refuses fallback NER)_\n")
          print(f"**Proof of execution — EDGE_DIR_FLIPS: control={af}, dir_fix={bf}.** "
                f"A non-zero dir_fix count proves the patched traversal ran and changed targets; "
                f"control must be 0. If flips>0 AND every metric below is bit-identical, the fix "
                f"genuinely ran but was inconsequential to the fused output (graph leg redundant under "
                f"BM25/vector), NOT a dead flag.\n")
          def fmt(x): return f"{x:.4f}" if x==x else "nan"
          print("| metric | control | dir_fix | delta |")
          print("| --- | --- | --- | --- |")
          print(f"| **recall@10 ALL** | {fmt(ao)} | {fmt(bo)} | {bo-ao:+.4f} |")
          print(f"| **p@1 ALL** | {fmt(ap)} | {fmt(bp)} | {bp-ap:+.4f} |")
          for c in sorted(set(ac)|set(bc)):
              a=ac.get(c,float('nan')); b=bc.get(c,float('nan'))
              d=(b-a) if (a==a and b==b) else float('nan')
              star=" <-- multi_hop" if c=='multi_hop' else ""
              print(f"| recall@10 {c}{star} | {fmt(a)} | {fmt(b)} | {d:+.4f} |")
          print("\n**Read:** flips>0 + all-deltas-zero (incl p@1) ⇒ the fix executed and altered traversal "
                "but did not change the fused ranking at all on these 50 questions — the graph leg is "
                "non-load-bearing in the full LongMemEval fusion; the coverage-ceiling verdict holds. "
                "flips>0 + p@1 moves but recall@10 flat ⇒ ranking changed below the top-10 threshold. "
                "flips==0 ⇒ the flag never fired and the A/B is invalid. Directional: limit=50.")
          PY

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-dir-lme-logs
          path: "*.log"
          if-no-files-found: warn
