name: ⑳ substrate quick-fixes A/B — query-NER seeding + Person↔Person typing (the AFTER)

# BEFORE (run 27269991016): ontology type-P@1 0.65(vector-leg)→0.10(full stack);
# lineage root-cause P@1 = 0.0 at every layer. Shipped since: effect-first causal
# cue direction fix (cd91dd7, unconditional — in every arm), SHODH_PERSON_PERSON_KNOWS
# (Person↔Person co-mentions typed Knows instead of CoOccurs), SHODH_QUERY_NER
# (graph leg seeds from the neural NER model instead of the POS heuristic that
# tags verbs/months as entities). This is the AFTER measurement + the locomo A/B.
#   A=base (PPR + fitted-gate defaults)  B=+query-NER  C=+person-knows  D=both
#   + ontology/lineage harnesses with both flags (compare against the BEFORE run).
# Gate: ALL ≥ base (~0.705) within noise; multi_hop/lineage/type-P@1 are the targets.

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/substrate-fixes-ab.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  substrate-fixes:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — base (current defaults)
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — +query-NER
        run: set -o pipefail; SHODH_QUERY_NER=1 ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — +person-knows
        run: set -o pipefail; SHODH_PERSON_PERSON_KNOWS=1 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3
      - name: D recall — both flags
        run: set -o pipefail; SHODH_QUERY_NER=1 SHODH_PERSON_PERSON_KNOWS=1 ./target/release/recall-eval --suite locomo --repeats 1 --output d.json --storage ./s-d 2>&1 | tail -3
      - name: Ontology harness — both flags (AFTER; before = run 27269991016)
        run: |
          set -o pipefail
          SHODH_QUERY_NER=1 SHODH_PERSON_PERSON_KNOWS=1 ./target/release/recall-eval --suite locomo --output o-main.json --ontology ontology.json --storage ./s-o | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Lineage harness — both flags (AFTER; before = run 27269991016)
        run: |
          set -o pipefail
          SHODH_QUERY_NER=1 SHODH_PERSON_PERSON_KNOWS=1 ./target/release/recall-eval --suite locomo --output l-main.json --lineage lineage.json --storage ./s-l | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'base':load('a.json'),'+qner':load('b.json'),'+pknows':load('c.json'),'both':load('d.json')}
          names=list(arms.keys())
          def m(d,cat,k='recall@10'):
              if not d: return float('nan')
              src = d['layers']['full'] if cat=='ALL' else d['by_category'][cat]
              return src.get(k,float('nan'))
          print("## ⑳ substrate quick-fixes — recall@10 (base ref ~0.705)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"| {cat} | "+" | ".join(f"{m(arms[n],cat):.4f}" for n in names)+" |")
          for cat in ('ALL','multi_hop','single_hop'):
              print(f"\n**Δ {cat} vs base:** "+", ".join(f"{n} {m(arms[n],cat)-m(arms['base'],cat):+.4f}" for n in names if n!='base'))
          print("\n**Decision:** judge vs the BEFORE harness numbers (run 27269991016: ontology full-stack "
                "type-P@1 0.10, lineage root-cause P@1 0.0). Quick fixes move lineage/type-P@1 meaningfully "
                "⇒ flags default-on PR, substrate build inherits a higher floor. Numbers stay ~0 ⇒ heuristic "
                "patching is exhausted — PROOF that only the real substrate (#65-68 RE + growable labels) "
                "can express these capabilities. recall gate: no arm may regress ALL > ~0.005.")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: substrate-fixes-json
          path: "*.json"
          if-no-files-found: warn
