name: ⑱ fitted gate CONFIRM — reproduce the broken tradeoff before defaulting

# Run 27268510462: fitted-symmetric trust_max=2.0 BROKE the structural tradeoff —
# ALL 0.6976→0.7074, multi_hop 0.4318→0.4896 (+0.058, the largest ever), single_hop
# HELD-and-up (0.7730), temporal held, p@1 +2.3pp. Boost-only failed (0.6879): the
# value is the calibrated DOWN-weighting. Monotone in trust_max (1.6→2.0 improved).
# Protocol: reproduce before defaulting (FLAT/PPR precedent) + probe trust_max 2.5.
#   A=base (PPR)   B=fitted-sym 2.0 (the candidate)   C=fitted-sym 2.5 (probe)
# Train-on-eval caveat stands (coefficients fitted on 70% of this suite's cases);
# the default PR documents it and stage 3 (online refit from feedback) replaces it.

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/fitted-confirm.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  fitted-confirm:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — base (PPR)
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — fitted-sym 2.0 (candidate)
        run: set -o pipefail; SHODH_FLAT_ADAPTIVE=1 SHODH_ADAPT_FEATURE=fitted SHODH_ADAPT_SYMMETRIC=1 SHODH_ADAPT_TRUST_MAX=2.0 ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — fitted-sym 2.5 (probe)
        run: set -o pipefail; SHODH_FLAT_ADAPTIVE=1 SHODH_ADAPT_FEATURE=fitted SHODH_ADAPT_SYMMETRIC=1 SHODH_ADAPT_TRUST_MAX=2.5 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'base':load('a.json'),'sym2.0':load('b.json'),'sym2.5':load('c.json')}
          names=list(arms.keys())
          def m(d,cat,k='recall@10'):
              if not d: return float('nan')
              src = d['layers']['full'] if cat=='ALL' else d['by_category'][cat]
              return src.get(k,float('nan'))
          print("## ⑱ fitted gate confirm (prior: base 0.6976, sym2.0 0.7074, multi 0.4896)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"| {cat} | "+" | ".join(f"{m(arms[n],cat):.4f}" for n in names)+" |")
          print("\n| ordering | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for k in ('p@1','mrr'):
              print(f"| {k} | "+" | ".join(f"{m(arms[n],'ALL',k):.4f}" for n in names)+" |")
          print("\n**Decision:** sym2.0 reproduces (ALL ≥ ~0.704, multi_hop ≥ ~0.47, single_hop ≥ base-0.003) "
                "⇒ DEFAULT PR (SHODH_FLAT_ADAPTIVE+fitted+symmetric on by default, train-on-eval caveat in "
                "the PR body) → re-baseline → STAGE 3 build (online refit from recall feedback; this fit = "
                "the cold-start seed). sym2.5 only displaces 2.0 if ALL and multi_hop are both higher with "
                "single_hop still held. Fails to reproduce ⇒ prior run was variance — re-examine before "
                "any default.")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fitted-confirm-json
          path: "*.json"
          if-no-files-found: warn
