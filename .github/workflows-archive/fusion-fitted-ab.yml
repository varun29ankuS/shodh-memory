name: ⑰ approach C stage 2b — fitted per-query trust gate A/B

# Stage 2 (run 27267533447): offline logistic over 11 pool features reached
# HOLDOUT AUC 0.756 (no single feature > 0.554 — which is why every stage-1
# single-feature attempt re-traded). Oracle: vector ranks gold better on 53% of
# MultiHop vs 27% of SingleHop — the per-query gate exists. Stage 2b hardcodes
# the fitted coefficients (SHODH_ADAPT_FEATURE=fitted) and A/Bs them.
# HONESTY CAVEAT: coefficients were fitted on this same suite (70% of cases);
# the full-suite numbers are partially train-on-eval. The gate that matters is
# single_hop HOLDING vs the PPR base; a stage-3 online refit is the durable form.
#   A=base (PPR, 0.6976)   B=fitted boost-only (max1.6)
#   C=fitted symmetric     D=fitted symmetric max2.0

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/fusion-fitted-ab.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  fitted:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — base (PPR)
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — fitted boost-only (max1.6)
        run: set -o pipefail; SHODH_FLAT_ADAPTIVE=1 SHODH_ADAPT_FEATURE=fitted ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — fitted symmetric (max1.6)
        run: set -o pipefail; SHODH_FLAT_ADAPTIVE=1 SHODH_ADAPT_FEATURE=fitted SHODH_ADAPT_SYMMETRIC=1 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3
      - name: D recall — fitted symmetric max2.0
        run: set -o pipefail; SHODH_FLAT_ADAPTIVE=1 SHODH_ADAPT_FEATURE=fitted SHODH_ADAPT_SYMMETRIC=1 SHODH_ADAPT_TRUST_MAX=2.0 ./target/release/recall-eval --suite locomo --repeats 1 --output d.json --storage ./s-d 2>&1 | tail -3

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'base':load('a.json'),'fitted':load('b.json'),'fitted-sym':load('c.json'),'fitted-sym2.0':load('d.json')}
          names=list(arms.keys())
          def m(d,cat,k='recall@10'):
              if not d: return float('nan')
              src = d['layers']['full'] if cat=='ALL' else d['by_category'][cat]
              return src.get(k,float('nan'))
          print("## ⑰ fitted per-query trust gate — recall@10 (PPR base ref 0.6976)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"| {cat} | "+" | ".join(f"{m(arms[n],cat):.4f}" for n in names)+" |")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"\n**Δ {cat} vs base:** "+", ".join(f"{n} {m(arms[n],cat)-m(arms['base'],cat):+.4f}" for n in names if n!='base'))
          print("\n| ordering | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for k in ('p@1','mrr'):
              print(f"| {k} | "+" | ".join(f"{m(arms[n],'ALL',k):.4f}" for n in names)+" |")
          print("\n**Decision (train-on-eval caveat applies — see header):** an arm lifts ALL with "
                "multi_hop UP and single_hop HELD (within ~0.003 of base) ⇒ approach C stage-2b "
                "PROVEN on this suite → confirm-run + default PR with the caveat documented, then "
                "STAGE 3 = online refit from feedback (the E2 moat: the coefficients become "
                "per-user learned state, the cold-start seed is this fit). All arms re-trade ⇒ even "
                "a 0.756-AUC gate cannot beat calibrated-max fusion at this altitude → close "
                "approach C, multi_hop lever moves to the substrate (#65-68).")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fusion-fitted-json
          path: "*.json"
          if-no-files-found: warn
