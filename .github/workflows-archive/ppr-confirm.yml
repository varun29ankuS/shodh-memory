name: ⑬ PPR confirm — reproduce the no-tradeoff win, probe PPR×traverse

# Run 27252898191: SHODH_PPR was the best graph-leg arm — ALL 0.6886→0.6976 (+0.009)
# with single_hop +0.012 AND temporal +0.014 (no tradeoff; multi_hop -0.006 only).
# FLAT protocol: reproduce before defaulting. This run also probes PPR×traverse
# (traverse alone lifted multi_hop +0.012 but traded temporal -0.028 — PPR's
# temporal strength may absorb it).
#   A=base (post-#321/#322 defaults)   B=PPR   C=PPR+traverse
# Decision: B reproduces ALL > base with single/temporal not regressing ⇒ PPR
# default PR (re-baseline after). C beats B on multi_hop without losing B's
# gains ⇒ C is the default candidate instead.

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/ppr-confirm.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  ppr-confirm:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — base
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — PPR
        run: set -o pipefail; SHODH_PPR=1 ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — PPR + traverse
        run: set -o pipefail; SHODH_PPR=1 SHODH_GRAPH_TRAVERSE=1 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3
      - name: A funnel — base
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --output oa.json --funnel fa.json --storage ./s-fa 2>&1 | tail -3
      - name: B funnel — PPR
        run: set -o pipefail; SHODH_PPR=1 ./target/release/recall-eval --suite locomo --output ob.json --funnel fb.json --storage ./s-fb 2>&1 | tail -3

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'base':load('a.json'),'ppr':load('b.json'),'ppr+trav':load('c.json')}
          names=list(arms.keys())
          def m(d,cat,k='recall@10'):
              if not d: return float('nan')
              src = d['layers']['full'] if cat=='ALL' else d['by_category'][cat]
              return src.get(k,float('nan'))
          print("## ⑬ PPR confirm — recall@10 (prior run: base 0.6886, PPR 0.6976)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"| {cat} | "+" | ".join(f"{m(arms[n],cat):.4f}" for n in names)+" |")
          for cat in ('ALL','single_hop','multi_hop','temporal'):
              print(f"\n**Δ {cat} vs base:** "+", ".join(f"{n} {m(arms[n],cat)-m(arms['base'],cat):+.4f}" for n in names if n!='base'))
          print("\n### ordering (p@1 / mrr ALL)")
          for k in ('p@1','mrr'):
              print(f"| {k} | "+" | ".join(f"{m(arms[n],'ALL',k):.4f}" for n in names)+" |")
          def g(fn,stage,k):
              if not fn: return float('nan')
              for r in fn.get('overall',[]):
                  if r['stage']==stage: return r.get(k,float('nan'))
              return float('nan')
          fa=load('fa.json'); fb=load('fb.json')
          print("\n### funnel — base vs PPR\n| stage.metric | base | ppr |")
          print("| --- | --- | --- |")
          for st in ('graph','fusion'):
              for k in ('present_pct','top10_pct','mean_rank_when_present'):
                  print(f"| {st} {k} | {g(fa,st,k):.2f} | {g(fb,st,k):.2f} |")
          print("\n**Decision:** PPR Δ ALL ≥ +0.005 with single_hop and temporal not regressing "
                "(within ~0.003 run noise) ⇒ REPRODUCED → make SHODH_PPR the default spread via PR "
                "(re-baseline everything after). ppr+trav: only displaces B if multi_hop gains ≥ +0.01 "
                "while keeping B's single/temporal. Both flat vs base ⇒ prior run was drift → keep "
                "hand-rolled spread, close the lever.")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppr-confirm-json
          path: "*.json"
          if-no-files-found: warn
