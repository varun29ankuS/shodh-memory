name: ⑫ graph-leg levers under FLAT — predicate weights / traverse / leg width / PPR

# AUDIT (2026-06-10, spreading activation): four pre-existing graph levers were all
# measured (or never measured) in the RRF era, where only the graph leg's RANK survived
# fusion. Under FLAT the leg's activation MAGNITUDE feeds the final score directly, so
# the regime changed. Plus one structural finding: the leg truncates to query.max_results
# (~10) at its own exit while vector/BM25 emit ~100 each — and the internal ranking that
# picks those 10 is a mini-fusion (semantic+linguistic+recency), not graph signal. That
# mechanically explains "leg emits 51% of 98%-reachable gold".
#   A = FLAT baseline (0.6853)
#   B = SHODH_GRAPH_PREDICATE_WEIGHTS=1  (Causes 1.3 vs CoOccurs 0.5 in spread)
#   C = SHODH_GRAPH_TRAVERSE=1           (compose-by-walk; lifted E3 2hop to 0.50 pre-FLAT)
#   D = SHODH_GRAPH_LEG_K=50             (widen the leg's exit gate 10→50, scoring unchanged)
#   E = SHODH_PPR=1                      (mass-conserving PageRank replaces BFS spread)
#   F = B+C+D combo                      (exploratory)
# Target: multi_hop (0.4379) UP, single_hop (0.7515) HELD. Funnels for A and D measure
# the graph-stage present% directly (the emit fix's primary metric).

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/graph-leg-ab.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  graph-leg:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — FLAT baseline
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — predicate weights
        run: set -o pipefail; SHODH_GRAPH_PREDICATE_WEIGHTS=1 ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — traverse (compose-by-walk)
        run: set -o pipefail; SHODH_GRAPH_TRAVERSE=1 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3
      - name: D recall — leg width 50
        run: set -o pipefail; SHODH_GRAPH_LEG_K=50 ./target/release/recall-eval --suite locomo --repeats 1 --output d.json --storage ./s-d 2>&1 | tail -3
      - name: E recall — PPR
        run: set -o pipefail; SHODH_PPR=1 ./target/release/recall-eval --suite locomo --repeats 1 --output e.json --storage ./s-e 2>&1 | tail -3
      - name: F recall — pred+traverse+width combo
        run: set -o pipefail; SHODH_GRAPH_PREDICATE_WEIGHTS=1 SHODH_GRAPH_TRAVERSE=1 SHODH_GRAPH_LEG_K=50 ./target/release/recall-eval --suite locomo --repeats 1 --output f.json --storage ./s-f 2>&1 | tail -3
      - name: A funnel — baseline
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --output oa.json --funnel fa.json --storage ./s-fa 2>&1 | tail -3
      - name: D funnel — leg width 50
        run: set -o pipefail; SHODH_GRAPH_LEG_K=50 ./target/release/recall-eval --suite locomo --output od.json --funnel fd.json --storage ./s-fd 2>&1 | tail -3

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'base':load('a.json'),'pred':load('b.json'),'traverse':load('c.json'),
                'width50':load('d.json'),'ppr':load('e.json'),'combo':load('f.json')}
          names=list(arms.keys())
          def m(d,cat,k='recall@10'):
              if not d: return float('nan')
              src = d['layers']['full'] if cat=='ALL' else d['by_category'][cat]
              return src.get(k,float('nan'))
          print("## ⑫ graph-leg levers under FLAT — recall@10 (base ref 0.6853, multi_hop 0.4379)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in ('ALL','single_hop','multi_hop','temporal','open_domain'):
              print(f"| {cat} | "+" | ".join(f"{m(arms[n],cat):.4f}" for n in names)+" |")
          for cat in ('ALL','single_hop','multi_hop'):
              print(f"\n**Δ {cat} vs base:** "+", ".join(f"{n} {m(arms[n],cat)-m(arms['base'],cat):+.4f}" for n in names if n!='base'))
          def g(fn,stage,k):
              if not fn: return float('nan')
              for r in fn.get('overall',[]):
                  if r['stage']==stage: return r.get(k,float('nan'))
              return float('nan')
          fa=load('fa.json'); fd=load('fd.json')
          print("\n### funnel — base vs width50 (graph-stage present% = the emit fix's metric)\n| stage.metric | base | width50 |")
          print("| --- | --- | --- |")
          for st in ('graph','fusion'):
              for k in ('present_pct','top10_pct','mean_rank_when_present'):
                  print(f"| {st} {k} | {g(fa,st,k):.2f} | {g(fd,st,k):.2f} |")
          print("\n**Decision:** judge each lever on multi_hop UP with single_hop HELD (≥~0.7515) — "
                "the graph leg's job is multi_hop; a lever that trades single_hop repeats the global-knob "
                "mistake. width50 funnel graph present% should rise toward the 98% reachability ceiling "
                "if the exit gate was the binding constraint; if present% rises but recall doesn't, the "
                "leg's internal mini-fusion ranking (semantic-dominated) is the next target, not the gate. "
                "Winners → fold into a combo confirm + default PR. All flat ⇒ graph magnitude quality "
                "is NOT the binding constraint under FLAT at this corpus scale → close the lever, "
                "return to #82 (per-query fusion weights).")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-leg-json
          path: "*.json"
          if-no-files-found: warn
